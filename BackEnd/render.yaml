services:
  - type: web
    name: dairy-management
    env: node
    region: oregon
    plan: free
    buildCommand: cd FrontEnd && npm install && npm run build && cd ../BackEnd && npm install
    startCommand: node BackEnd/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: ML_SERVICE_URL
        sync: false
